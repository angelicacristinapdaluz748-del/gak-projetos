<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAK Engenharia — Controle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f1;color:#1a1a18;min-height:100vh}
.topnav{background:#fff;border-bottom:0.5px solid #e0dfd8;padding:0 2rem;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:10}
.topnav-logo{width:32px;height:32px;background:#1a1a18;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.topnav-logo span{color:#fff;font-weight:700;font-size:13px}
.topnav-title{font-size:15px;font-weight:500}
.tabs{display:flex;border-bottom:0.5px solid #e0dfd8;background:#fff;padding:0 2rem}
.tab{padding:12px 20px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#888780;font-family:inherit;background:transparent;border-top:none;border-left:none;border-right:none;transition:all 0.15s}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:500}
.tab:hover:not(.active){color:#1a1a18}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.hidden{display:none}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border-radius:10px;border:0.5px solid #e0dfd8;padding:1rem 1.25rem}
.metric-label{font-size:12px;color:#888780;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:500}
.danger{color:#a32d2d}.warn{color:#854f0b}.info{color:#185fa5}.success{color:#3b6d11}.purple{color:#533ab7}
.bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:13px;color:#888780}
.pill{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid #d3d1c7;background:transparent;cursor:pointer;color:#5f5e5a;font-family:inherit}
.pill:hover{background:#f1efe8}
.pill.active{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.bar-right{display:flex;gap:8px;align-items:center}
.search-input{font-size:13px;padding:7px 11px;border-radius:8px;border:0.5px solid #d3d1c7;background:#fff;color:#1a1a18;width:180px;outline:none}
.search-input:focus{border-color:#185fa5}
.table-wrap{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:12px;font-weight:500;color:#888780;padding:10px 14px;text-align:left;border-bottom:0.5px solid #e0dfd8;background:#f9f8f5;white-space:nowrap}
td{font-size:13px;color:#1a1a18;padding:12px 14px;border-bottom:0.5px solid #f1efe8;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.row{cursor:pointer}
tr.row:hover td{background:#f9f8f5}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge.vencido{background:#fcebeb;color:#a32d2d}
.badge.atencao{background:#faeeda;color:#854f0b}
.badge.andamento,.badge.ok{background:#e6f1fb;color:#185fa5}
.badge.pausado{background:#f1efe8;color:#5f5e5a}
.badge.concluido{background:#eaf3de;color:#3b6d11}
.badge.aguardando{background:#faeeda;color:#854f0b}
.badge.laudo-entregue{background:#e1f5ee;color:#0f6e56}
.badge.aguard-pgto{background:#eae3fe;color:#533ab7}
.dias-badge{display:inline-block;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px}
.dias-badge.danger{background:#fcebeb;color:#a32d2d}
.dias-badge.warn{background:#faeeda;color:#854f0b}
.dias-badge.ok{background:#eaf3de;color:#3b6d11}
.dias-badge.gray{background:#f1efe8;color:#5f5e5a}
.empty{text-align:center;padding:3rem;color:#888780;font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#fff;border-radius:14px;border:0.5px solid #e0dfd8;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.mhdr{padding:1.25rem 1.5rem;border-bottom:0.5px solid #e0dfd8;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.mhdr h2{font-size:16px;font-weight:500}
.mbody{padding:1.25rem 1.5rem}
.mfoot{padding:1rem 1.5rem;border-top:0.5px solid #e0dfd8;display:flex;gap:8px;justify-content:flex-end;align-items:center;position:sticky;bottom:0;background:#fff}
.xbtn{background:transparent;border:none;cursor:pointer;font-size:22px;color:#888780;line-height:1}
.xbtn:hover{color:#1a1a18}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:12px;color:#888780;font-weight:500}
.f input,.f select,.f textarea{font-size:13px;border-radius:8px;border:0.5px solid #d3d1c7;padding:8px 11px;background:#fff;color:#1a1a18;width:100%;outline:none;font-family:inherit}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#185fa5}
.f textarea{min-height:72px;resize:vertical}
.msec{margin-bottom:14px}
.msec>label{font-size:12px;color:#888780;font-weight:500;display:block;margin-bottom:8px}
.mitem{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.mitem input[type=text]{flex:1;font-size:13px;border-radius:8px;border:0.5px solid #d3d1c7;padding:7px 10px;background:#fff;color:#1a1a18;outline:none;font-family:inherit}
.mitem input[type=date]{width:145px;font-size:13px;border-radius:8px;border:0.5px solid #d3d1c7;padding:7px 10px;background:#fff;color:#1a1a18;outline:none}
.alink{font-size:12px;color:#185fa5;background:transparent;border:none;cursor:pointer;padding:0;font-family:inherit}
.rmbtn{background:transparent;border:none;cursor:pointer;color:#888780;font-size:20px;line-height:1;flex-shrink:0}
.rmbtn:hover{color:#a32d2d}
.btn{font-size:13px;padding:7px 16px;border-radius:8px;border:0.5px solid #d3d1c7;background:#fff;color:#1a1a18;cursor:pointer;font-family:inherit}
.btn:hover{background:#f1efe8}
.btn-p{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-p:hover{background:#333}
.btn-d{color:#a32d2d;border-color:#f0a0a0}
.btn-d:hover{background:#fcebeb}
.sp{flex:1}
.dl{margin-bottom:14px}
.dll{font-size:12px;color:#888780;font-weight:500;margin-bottom:3px}
.dlv{font-size:13px;color:#1a1a18}
.mchk{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;padding:10px;border-radius:8px;background:#f9f8f5;border:0.5px solid #e0dfd8}
.mchk input[type=checkbox]{width:16px;height:16px;cursor:pointer;margin-top:1px;flex-shrink:0;accent-color:#185fa5}
.toast{position:fixed;bottom:2rem;right:2rem;background:#1a1a18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:700px){.page{padding:1rem}.topnav,.tabs{padding:0 1rem}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-logo"><span>GAK</span></div>
  <span class="topnav-title">Controle de serviços</span>
</nav>
<div class="tabs">
  <button class="tab active" onclick="aba('p',this)">Projetos de engenharia</button>
  <button class="tab" onclick="aba('pe',this)">Perícias &amp; laudos</button>
</div>

<div id="pg-p" class="page">
  <div class="metrics" id="mp"></div>
  <div class="bar">
    <div class="filters">
      <span class="filter-label">Filtrar:</span>
      <button class="pill active" onclick="fp('todos',this)">Todos</button>
      <button class="pill" onclick="fp('vencido',this)">Vencidos</button>
      <button class="pill" onclick="fp('atencao',this)">Atenção</button>
      <button class="pill" onclick="fp('ok',this)">No prazo</button>
      <button class="pill" onclick="fp('pausado',this)">Pausado</button>
      <button class="pill" onclick="fp('concluido',this)">Concluídos</button>
    </div>
    <div class="bar-right">
      <input class="search-input" id="sp" type="text" placeholder="Buscar...">
      <button class="btn btn-p" onclick="novoP()">+ Novo projeto</button>
    </div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:75px">#</th><th style="width:18%">Cliente</th><th>Objeto</th>
      <th style="width:100px">Próx. entrega</th><th style="width:80px">Dias</th>
      <th style="width:110px">Valor</th><th style="width:115px">Status</th><th style="width:58px"></th>
    </tr></thead>
    <tbody id="tbp"></tbody>
  </table></div>
</div>

<div id="pg-pe" class="page hidden">
  <div class="metrics" id="mpe"></div>
  <div class="bar">
    <div class="filters">
      <span class="filter-label">Filtrar:</span>
      <button class="pill active" onclick="fpe('todos',this)">Todos</button>
      <button class="pill" onclick="fpe('aguardando',this)">Aguardando</button>
      <button class="pill" onclick="fpe('laudo-entregue',this)">Laudo entregue</button>
      <button class="pill" onclick="fpe('aguard-pgto',this)">Aguard. pgto</button>
      <button class="pill" onclick="fpe('concluido',this)">Concluídos</button>
    </div>
    <div class="bar-right">
      <input class="search-input" id="spe" type="text" placeholder="Buscar...">
      <button class="btn btn-p" onclick="novoPe()">+ Nova perícia</button>
    </div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:170px">Nº processo / ref.</th><th style="width:20%">Parte / cliente</th>
      <th>Objeto</th><th style="width:130px">Vara / comarca</th>
      <th style="width:105px">Valor</th><th style="width:130px">Status</th><th style="width:58px"></th>
    </tr></thead>
    <tbody id="tbpe"></tbody>
  </table></div>
</div>

<div id="modal" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
var SKP='gak_proj_v2',SKPE='gak_peri_v2';
var hoje=new Date();hoje.setHours(0,0,0,0);
var fP='todos',fPE='todos',sP='',sPE='';
var npId=8,npeId=8;

var PI=[
  {id:1,num:'#133',cliente:'José Roberto Canteri ME',contato:'Roberto',objeto:'Assistência técnica judicial — Retroescavadeira Forza BR',dataInicio:'2025-07-25',marcos:[{nome:'Entrega laudo técnico',data:'',concluido:false},{nome:'Conclusão do processo',data:'',concluido:false}],valor:4000,status:'andamento',obs:'Processo 5006759-71.2024.8.24.0045. Pag: 50% 1ª entrega + 50% após laudo.'},
  {id:2,num:'#156',cliente:'OESL',contato:'Vitor Dovaroski',objeto:'Inspeção e regularização NR-13 — Vasos de pressão e autoclaves',dataInicio:'2025-11-07',marcos:[{nome:'Entrega laudos NR-13',data:'',concluido:false}],valor:23100,status:'andamento',obs:'Sem TH: R$23.100. Com TH (3 autoclaves): R$26.700.'},
  {id:3,num:'#166.1',cliente:'LDC',contato:'Felippe Neves',objeto:'Projeto de prancha para tombador elevatório — FEA e detalhamento',dataInicio:'2025-12-19',marcos:[{nome:'Entrega projeto + análise FEA',data:'',concluido:false}],valor:6122.68,status:'andamento',obs:'Inclui deslocamento Ponta Grossa–Paraguaçu Paulista (764 km).'},
  {id:4,num:'#167.1',cliente:'Cooperativa Frísia',contato:'Felipe',objeto:'Levantamento e cadastro de ativos — Fábrica de Rações Carambeí',dataInicio:'2025-12-19',marcos:[{nome:'Relatório final por unidade',data:'2026-02-06',concluido:false}],valor:23500,status:'andamento',obs:'ISO 14224/55000. ~30 dias de campo, 2 pessoas.'},
  {id:5,num:'#184',cliente:'LDC',contato:'Felippe Neves',objeto:'Análise estrutural FEA — prancha tombador elevatório',dataInicio:'2026-03-31',marcos:[{nome:'Memorial de cálculo + relatório FEA',data:'2026-05-15',concluido:false}],valor:15707.88,status:'andamento',obs:'Prazo: 45 dias após aprovação. Inclui CAD, FEA e ART.'},
  {id:6,num:'#194',cliente:'Castrolanda',contato:'Karlony — Engenharia',objeto:'Projeto de ar comprimido — Unidade Tocantins',dataInicio:'2026-02-20',marcos:[{nome:'Entrega básica ou detalhada',data:'2026-04-01',concluido:false}],valor:16000,status:'andamento',obs:'Alt. A: R$7.000 / Alt. B: R$16.000. Prazo: 40 dias da OC.'},
  {id:7,num:'#195',cliente:'MedVitae',contato:'Leandro Marinho',objeto:'Projeto HVAC — Clínica de Medicina do Trabalho',dataInicio:'2026-02-26',marcos:[{nome:'Entrega básica (Proposta 1)',data:'2026-03-28',concluido:false},{nome:'Entrega detalhada (Proposta 2)',data:'2026-04-17',concluido:false}],valor:11280.95,status:'andamento',obs:'Proposta 1: R$5.840,48 / Proposta 2: R$11.280,95.'}
];

var PEI=[
  {id:1,processo:'5006759-71.2024.8.24.0045',parte:'José Roberto Canteri ME',vara:'Vara Cível — Ipiranga/SC',objeto:'Assistência técnica — Retroescavadeira Forza BR (vícios técnicos)',dataInicio:'2025-07-25',valor:4000,status:'aguardando',obs:'Contrato particular GAK. Pag: 50% 1ª entrega + 50% após laudo.'},
  {id:2,processo:'0000981-57.2022.8.16.0092',parte:'Perito judicial nomeado',vara:'Vara Cível — Imbituva/PR',objeto:'Laudo pericial — acidente caminhão e ônibus',dataInicio:'2025-05-22',valor:3120,status:'aguard-pgto',obs:'Honorários: R$3.120. Adiantamento 50%: R$1.560. Dados RPV enviados em 10/06/2025.'},
  {id:3,processo:'0000945-61.2022.8.16.0206',parte:'Perito judicial nomeado',vara:'2ª Vara Cível — Irati/PR',objeto:'Laudo pericial — rescisão contratual c/c indenizatória (danos materiais e morais)',dataInicio:'2025-03-26',valor:1850,status:'laudo-entregue',obs:'Valor fixado em R$1.850 (justiça gratuita). Aceite confirmado em 26/03/2025.'},
  {id:4,processo:'ART 1720260887670',parte:'Ernani Jode Federovicz',vara:'Particular — Mallet/PR',objeto:'Inspeção técnica veicular — L200 (verificação qualidade de reparos)',dataInicio:'2026-01-28',valor:1500,status:'concluido',obs:'ART registrada 12/02/2026. Pago via PIX R$1.500 em 13/02/2026 (Sicoob).'},
  {id:5,processo:'ART 1720261716631',parte:'Hendryw Fabricio de Paula Ltda',vara:'Particular — Ponta Grossa/PR',objeto:'Inspeção e laudo — Ford Ka (DS Multimarcas)',dataInicio:'2026-02-19',valor:850,status:'laudo-entregue',obs:'ART registrada 21/03/2026. Contrato: R$850. Aguardando pagamento final.'},
  {id:6,processo:'ART 1720257216611',parte:'NATO Construções e Participações Ltda',vara:'Particular — Guarapuava/PR',objeto:'Laudo estrutural — estrutura metálica tipo gaiola para vala de esgoto',dataInicio:'2025-11-20',valor:2500,status:'aguard-pgto',obs:'ART registrada 04/12/2025. NFS-e nº 114 emitida (R$2.500). Boleto venc. 12/03/2026.'},
  {id:7,processo:'Ref. Jailson Xavier',parte:'Jailson Batista Xavier',vara:'Particular — Ponta Grossa/PR',objeto:'Assistência técnica jurídica — acompanhamento processual',dataInicio:'2025-01-01',valor:3575,status:'concluido',obs:'Pago no cartão (parcelado, máquina Saborismo). Valor recebido: R$3.575.'}
];


function load(k,d,ref){
  try{
    var rr=localStorage.getItem(k);
    if(rr){
      var oo=JSON.parse(rr);
      if(oo.data&&oo.data.length>0){if(ref==="p")npId=oo.nextId||8;else npeId=oo.nextId||8;return oo.data;}
      else{localStorage.removeItem(k);}
    }
  }catch(e){try{localStorage.removeItem(k);}catch(e2){}}
  if(ref==="p")npId=8;else npeId=8;
  try{localStorage.setItem(k,JSON.stringify({data:d,nextId:8}));}catch(e){}
  return JSON.parse(JSON.stringify(d));
}
function save(k,d,nid){try{localStorage.setItem(k,JSON.stringify({data:d,nextId:nid}));}catch(e){}}

var projetos=load(SKP,PI,"p"), pericias=load(SKPE,PEI,"pe");

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function show(h){var m=document.getElementById('modal');m.innerHTML=h;m.style.display='block';}
function fechar(){var m=document.getElementById('modal');m.style.display='none';m.innerHTML='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')fechar();});

function aba(n,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('pg-p').classList.toggle('hidden',n!=='p');
  document.getElementById('pg-pe').classList.toggle('hidden',n!=='pe');
}

function fd(s){if(!s)return'—';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fv(v){return'R$\u00a0'+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* PROJETOS */
function dP(p){
  if(p.status==='concluido'||p.status==='pausado')return null;
  var a=p.marcos.filter(function(m){return!m.concluido&&m.data;}).map(function(m){return new Date(m.data+'T00:00:00');});
  if(!a.length)return null;
  return Math.round((a.sort(function(x,y){return x-y;})[0]-hoje)/86400000);
}
function uP(p){
  if(p.status==='concluido')return'concluido';
  if(p.status==='pausado')return'pausado';
  var d=dP(p);if(d===null)return'ok';if(d<0)return'vencido';if(d<=7)return'atencao';return'ok';
}
function pE(p){
  var a=p.marcos.filter(function(m){return!m.concluido&&m.data;}).map(function(m){return m.data;});
  if(!a.length){var t=p.marcos.filter(function(m){return m.data;}).map(function(m){return m.data;});return t.length?fd(t.sort().pop()):'—';}
  return fd(a.sort()[0]);
}

function rMP(){
  var at=projetos.filter(function(p){return p.status!=='concluido';});
  var vc=at.filter(function(p){return uP(p)==='vencido';}).length;
  var al=at.filter(function(p){return uP(p)==='atencao';}).length;
  var ab=at.reduce(function(s,p){return s+Number(p.valor);},0);
  document.getElementById('mp').innerHTML=
    '<div class="metric"><div class="metric-label">Projetos ativos</div><div class="metric-value info">'+at.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Vencidos</div><div class="metric-value danger">'+vc+'</div></div>'+
    '<div class="metric"><div class="metric-label">Atenção (≤7d)</div><div class="metric-value warn">'+al+'</div></div>'+
    '<div class="metric"><div class="metric-label">Em aberto</div><div class="metric-value">'+fv(ab)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Total geral</div><div class="metric-value success">'+fv(projetos.reduce(function(s,p){return s+Number(p.valor);},0))+'</div></div>';
}

function rTP(){
  var ord={vencido:0,atencao:1,ok:2,andamento:2,pausado:3,concluido:4};
  var lista=projetos.slice().sort(function(a,b){
    var ua=uP(a),ub=uP(b);if(ord[ua]!==ord[ub])return ord[ua]-ord[ub];
    var da=dP(a),db=dP(b);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;
  });
  if(fP!=='todos')lista=lista.filter(function(p){return uP(p)===fP;});
  if(sP)lista=lista.filter(function(p){return(p.cliente+p.num+p.objeto).toLowerCase().includes(sP);});
  var sl={andamento:'Em andamento',pausado:'Pausado',concluido:'Concluído'};
  var tb=document.getElementById('tbp');
  if(!lista.length){tb.innerHTML='<tr><td colspan="8" class="empty">Nenhum projeto encontrado.</td></tr>';return;}
  tb.innerHTML=lista.map(function(p){
    var u=uP(p),d=dP(p),ds=d===null?'—':(d<0?d+'d':'+'+d+'d'),dc=d===null?'gray':(d<0?'danger':(d<=7?'warn':'ok'));
    return'<tr class="row" onclick="vP('+p.id+')">'+
      '<td style="font-weight:500;color:#888780">'+esc(p.num)+'</td>'+
      '<td style="font-weight:500">'+esc(p.cliente)+'</td>'+
      '<td style="color:#5f5e5a">'+esc(p.objeto)+'</td>'+
      '<td>'+pE(p)+'</td>'+
      '<td><span class="dias-badge '+dc+'">'+ds+'</span></td>'+
      '<td>'+fv(p.valor)+'</td>'+
      '<td><span class="badge '+u+'">'+(sl[p.status]||'Em andamento')+'</span></td>'+
      '<td><button class="btn" style="font-size:12px;padding:4px 10px" onclick="event.stopPropagation();eP('+p.id+')">editar</button></td>'+
    '</tr>';
  }).join('');
}

function fp(f,el){fP=f;document.querySelectorAll('#pg-p .pill').forEach(function(x){x.classList.remove('active');});el.classList.add('active');rTP();}
document.getElementById('sp').addEventListener('input',function(e){sP=e.target.value.toLowerCase();rTP();});

function vP(id){
  var p=projetos.find(function(x){return x.id===id;});if(!p)return;
  var u=uP(p),sl={andamento:'Em andamento',pausado:'Pausado',concluido:'Concluído'};
  var mh=p.marcos.map(function(m,i){
    var d=m.data?new Date(m.data+'T00:00:00'):null,di=d?Math.round((d-hoje)/86400000):null;
    var info=m.concluido?'concluído':(!d?'sem data':(di<0?'vencido há '+Math.abs(di)+'d':'em '+di+'d'));
    return'<div class="mchk"><input type="checkbox" '+(m.concluido?'checked':'')+' onchange="tmP('+id+','+i+',this.checked)">'+
      '<div><div style="font-size:13px;'+(m.concluido?'text-decoration:line-through;color:#888780':'')+'">'+esc(m.nome||'Marco')+'</div>'+
      '<div style="font-size:12px;color:#888780;margin-top:2px">'+fd(m.data)+' — '+info+'</div></div></div>';
  }).join('');
  show('<div class="modal-bg" id="mb1"><div class="modal">'+
    '<div class="mhdr"><div><div style="font-size:12px;color:#888780;margin-bottom:2px">'+esc(p.num)+'</div><h2>'+esc(p.cliente)+'</h2></div><button class="xbtn" onclick="fechar()">×</button></div>'+
    '<div class="mbody">'+
    '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"><span class="badge '+u+'">'+(sl[p.status]||'Em andamento')+'</span><span style="font-size:13px;font-weight:500">'+fv(p.valor)+'</span></div>'+
    '<div class="dl"><div class="dll">Objeto</div><div class="dlv">'+esc(p.objeto)+'</div></div>'+
    (p.contato?'<div class="dl"><div class="dll">Contato</div><div class="dlv">'+esc(p.contato)+'</div></div>':'')+
    (p.dataInicio?'<div class="dl"><div class="dll">Início</div><div class="dlv">'+fd(p.dataInicio)+'</div></div>':'')+
    '<div class="dl"><div class="dll">Marcos de entrega</div>'+mh+'</div>'+
    (p.obs?'<div class="dl"><div class="dll">Observações</div><div style="font-size:13px;color:#5f5e5a;background:#f9f8f5;padding:10px;border-radius:8px;line-height:1.6">'+esc(p.obs)+'</div></div>':'')+
    '</div>'+
    '<div class="mfoot"><button class="btn btn-d" onclick="dP2('+id+')">Excluir</button><span class="sp"></span><button class="btn" onclick="fechar()">Fechar</button><button class="btn btn-p" onclick="eP('+id+')">Editar</button></div>'+
    '</div></div>');
  document.getElementById('mb1').addEventListener('click',function(e){if(e.target===this)fechar();});
}

function tmP(pid,idx,val){var p=projetos.find(function(x){return x.id===pid;});if(p)p.marcos[idx].concluido=val;save(SKP,projetos,npId);renderP();vP(pid);}
function novoP(){frmP(null);}
function eP(id){fechar();setTimeout(function(){frmP(projetos.find(function(p){return p.id===id;}));},80);}

function frmP(p){
  var novo=!p;
  if(!p)p={id:null,num:'',cliente:'',contato:'',objeto:'',dataInicio:'',marcos:[{nome:'Entrega',data:'',concluido:false}],valor:'',status:'andamento',obs:''};
  window._m=p.marcos.map(function(m){return{nome:m.nome,data:m.data,concluido:!!m.concluido};});
  function ml(){return window._m.map(function(m,i){return'<div class="mitem">'+
    '<input type="text" placeholder="Descrição" value="'+esc(m.nome)+'" oninput="window._m['+i+'].nome=this.value">'+
    '<input type="date" value="'+m.data+'" onchange="window._m['+i+'].data=this.value">'+
    '<button class="rmbtn" onclick="rmM('+i+')" type="button">×</button></div>';}).join('');}
  show('<div class="modal-bg" id="mb2"><div class="modal">'+
    '<div class="mhdr"><h2>'+(novo?'Novo projeto':'Editar projeto')+'</h2><button class="xbtn" onclick="fechar()">×</button></div>'+
    '<div class="mbody">'+
    '<div class="frow"><div class="f"><label>Nº da proposta</label><input type="text" id="fn" value="'+esc(p.num)+'" placeholder="#196"></div>'+
    '<div class="f"><label>Status</label><select id="fst"><option value="andamento"'+(p.status==='andamento'?' selected':'')+'>Em andamento</option><option value="pausado"'+(p.status==='pausado'?' selected':'')+'>Pausado</option><option value="concluido"'+(p.status==='concluido'?' selected':'')+'>Concluído</option></select></div></div>'+
    '<div class="frow"><div class="f"><label>Cliente</label><input type="text" id="fc" value="'+esc(p.cliente)+'"></div>'+
    '<div class="f"><label>Contato (A/C)</label><input type="text" id="fct" value="'+esc(p.contato)+'"></div></div>'+
    '<div class="f" style="margin-bottom:14px"><label>Objeto / serviço</label><input type="text" id="fo" value="'+esc(p.objeto)+'"></div>'+
    '<div class="frow"><div class="f"><label>Data de início</label><input type="date" id="fdi" value="'+p.dataInicio+'"></div>'+
    '<div class="f"><label>Valor (R$)</label><input type="number" id="fvl" value="'+p.valor+'" step="0.01" min="0"></div></div>'+
    '<div class="msec"><label>Marcos de entrega</label><div id="mlist">'+ml()+'</div><button class="alink" onclick="addM()" type="button">+ Adicionar marco</button></div>'+
    '<div class="f"><label>Observações</label><textarea id="fob">'+esc(p.obs)+'</textarea></div>'+
    '</div>'+
    '<div class="mfoot">'+(novo?'':`<button class="btn btn-d" onclick="dP2(${p.id})" type="button">Excluir</button>`)+'<span class="sp"></span>'+
    '<button class="btn" onclick="fechar()" type="button">Cancelar</button><button class="btn btn-p" onclick="svP('+(novo?'null':p.id)+')" type="button">Salvar</button></div>'+
    '</div></div>');
  document.getElementById('mb2').addEventListener('click',function(e){if(e.target===this)fechar();});
  window.addM=function(){window._m.push({nome:'',data:'',concluido:false});document.getElementById('mlist').innerHTML=ml();};
  window.rmM=function(i){if(window._m.length<=1)return;window._m.splice(i,1);document.getElementById('mlist').innerHTML=ml();};
}

function svP(id){
  var cli=document.getElementById('fc').value.trim();if(!cli){alert('Informe o cliente.');return;}
  var obj={id:id===null?npId++:id,num:document.getElementById('fn').value.trim(),cliente:cli,
    contato:document.getElementById('fct').value.trim(),objeto:document.getElementById('fo').value.trim(),
    dataInicio:document.getElementById('fdi').value,marcos:window._m.filter(function(m){return m.nome||m.data;}),
    valor:parseFloat(document.getElementById('fvl').value)||0,status:document.getElementById('fst').value,
    obs:document.getElementById('fob').value.trim()};
  if(!obj.marcos.length)obj.marcos=[{nome:'Entrega',data:'',concluido:false}];
  if(id===null){projetos.push(obj);toast('Projeto cadastrado!');}
  else{var i=projetos.findIndex(function(p){return p.id===id;});if(i>=0)projetos[i]=obj;toast('Atualizado!');}
  save(SKP,projetos,npId);fechar();renderP();
}
function dP2(id){if(!confirm('Excluir este projeto?'))return;projetos=projetos.filter(function(p){return p.id!==id;});save(SKP,projetos,npId);fechar();renderP();toast('Excluído.');}

function renderP(){rMP();rTP();}

/* PERÍCIAS */
function rMPe(){
  var at=pericias.filter(function(p){return p.status!=='concluido';});
  var ag=pericias.filter(function(p){return p.status==='aguardando';}).length;
  var ap=pericias.filter(function(p){return p.status==='aguard-pgto';}).length;
  var ab=at.reduce(function(s,p){return s+Number(p.valor);},0);
  document.getElementById('mpe').innerHTML=
    '<div class="metric"><div class="metric-label">Perícias ativas</div><div class="metric-value info">'+at.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Aguardando prazo</div><div class="metric-value warn">'+ag+'</div></div>'+
    '<div class="metric"><div class="metric-label">Aguard. pagamento</div><div class="metric-value purple">'+ap+'</div></div>'+
    '<div class="metric"><div class="metric-label">Em aberto</div><div class="metric-value">'+fv(ab)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Total geral</div><div class="metric-value success">'+fv(pericias.reduce(function(s,p){return s+Number(p.valor);},0))+'</div></div>';
}

function rTPe(){
  var ordS={aguard-pgto:0,'laudo-entregue':1,aguardando:2,concluido:3};
  var lista=pericias.slice().sort(function(a,b){return(ordS[a.status]||2)-(ordS[b.status]||2);});
  if(fPE!=='todos')lista=lista.filter(function(p){return p.status===fPE;});
  if(sPE)lista=lista.filter(function(p){return(p.parte+p.processo+p.objeto+p.vara).toLowerCase().includes(sPE);});
  var sl={'aguardando':'Aguardando prazo','laudo-entregue':'Laudo entregue','aguard-pgto':'Aguard. pagamento','concluido':'Concluído'};
  var tb=document.getElementById('tbpe');
  if(!lista.length){tb.innerHTML='<tr><td colspan="7" class="empty">Nenhuma perícia encontrada.</td></tr>';return;}
  tb.innerHTML=lista.map(function(p){
    return'<tr class="row" onclick="vPe('+p.id+')">'+
      '<td style="font-size:12px;color:#888780;font-weight:500">'+esc(p.processo)+'</td>'+
      '<td style="font-weight:500">'+esc(p.parte)+'</td>'+
      '<td style="color:#5f5e5a">'+esc(p.objeto)+'</td>'+
      '<td style="font-size:12px;color:#5f5e5a">'+esc(p.vara)+'</td>'+
      '<td>'+fv(p.valor)+'</td>'+
      '<td><span class="badge '+p.status+'">'+(sl[p.status]||p.status)+'</span></td>'+
      '<td><button class="btn" style="font-size:12px;padding:4px 10px" onclick="event.stopPropagation();ePe('+p.id+')">editar</button></td>'+
    '</tr>';
  }).join('');
}

function fpe(f,el){fPE=f;document.querySelectorAll('#pg-pe .pill').forEach(function(x){x.classList.remove('active');});el.classList.add('active');rTPe();}
document.getElementById('spe').addEventListener('input',function(e){sPE=e.target.value.toLowerCase();rTPe();});

function vPe(id){
  var p=pericias.find(function(x){return x.id===id;});if(!p)return;
  var sl={'aguardando':'Aguardando prazo','laudo-entregue':'Laudo entregue','aguard-pgto':'Aguard. pagamento','concluido':'Concluído'};
  show('<div class="modal-bg" id="mb3"><div class="modal">'+
    '<div class="mhdr"><div><div style="font-size:12px;color:#888780;margin-bottom:2px">'+esc(p.processo)+'</div><h2>'+esc(p.parte)+'</h2></div><button class="xbtn" onclick="fechar()">×</button></div>'+
    '<div class="mbody">'+
    '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"><span class="badge '+p.status+'">'+(sl[p.status]||p.status)+'</span><span style="font-size:13px;font-weight:500">'+fv(p.valor)+'</span></div>'+
    '<div class="dl"><div class="dll">Objeto</div><div class="dlv">'+esc(p.objeto)+'</div></div>'+
    '<div class="dl"><div class="dll">Vara / comarca</div><div class="dlv">'+esc(p.vara)+'</div></div>'+
    (p.dataInicio?'<div class="dl"><div class="dll">Início</div><div class="dlv">'+fd(p.dataInicio)+'</div></div>':'')+
    (p.obs?'<div class="dl"><div class="dll">Observações</div><div style="font-size:13px;color:#5f5e5a;background:#f9f8f5;padding:10px;border-radius:8px;line-height:1.6">'+esc(p.obs)+'</div></div>':'')+
    '</div>'+
    '<div class="mfoot"><button class="btn btn-d" onclick="dPe('+id+')">Excluir</button><span class="sp"></span><button class="btn" onclick="fechar()">Fechar</button><button class="btn btn-p" onclick="ePe('+id+')">Editar</button></div>'+
    '</div></div>');
  document.getElementById('mb3').addEventListener('click',function(e){if(e.target===this)fechar();});
}

function novoPe(){frmPe(null);}
function ePe(id){fechar();setTimeout(function(){frmPe(pericias.find(function(p){return p.id===id;}));},80);}

function frmPe(p){
  var novo=!p;
  if(!p)p={id:null,processo:'',parte:'',vara:'',objeto:'',dataInicio:'',valor:'',status:'aguardando',obs:''};
  show('<div class="modal-bg" id="mb4"><div class="modal">'+
    '<div class="mhdr"><h2>'+(novo?'Nova perícia / laudo':'Editar perícia / laudo')+'</h2><button class="xbtn" onclick="fechar()">×</button></div>'+
    '<div class="mbody">'+
    '<div class="frow"><div class="f"><label>Nº do processo / referência</label><input type="text" id="pepr" value="'+esc(p.processo)+'"></div>'+
    '<div class="f"><label>Status</label><select id="pest">'+
    '<option value="aguardando"'+(p.status==='aguardando'?' selected':'')+'>Aguardando prazo</option>'+
    '<option value="laudo-entregue"'+(p.status==='laudo-entregue'?' selected':'')+'>Laudo entregue</option>'+
    '<option value="aguard-pgto"'+(p.status==='aguard-pgto'?' selected':'')+'>Aguard. pagamento</option>'+
    '<option value="concluido"'+(p.status==='concluido'?' selected':'')+'>Concluído</option>'+
    '</select></div></div>'+
    '<div class="frow"><div class="f"><label>Parte / cliente</label><input type="text" id="pepa" value="'+esc(p.parte)+'"></div>'+
    '<div class="f"><label>Vara / comarca</label><input type="text" id="peva" value="'+esc(p.vara)+'"></div></div>'+
    '<div class="f" style="margin-bottom:14px"><label>Objeto</label><input type="text" id="peob" value="'+esc(p.objeto)+'"></div>'+
    '<div class="frow"><div class="f"><label>Data de início</label><input type="date" id="pedi" value="'+p.dataInicio+'"></div>'+
    '<div class="f"><label>Valor (R$)</label><input type="number" id="peval" value="'+p.valor+'" step="0.01" min="0"></div></div>'+
    '<div class="f"><label>Observações</label><textarea id="peobs">'+esc(p.obs)+'</textarea></div>'+
    '</div>'+
    '<div class="mfoot">'+(novo?'':`<button class="btn btn-d" onclick="dPe(${p.id})" type="button">Excluir</button>`)+'<span class="sp"></span>'+
    '<button class="btn" onclick="fechar()" type="button">Cancelar</button><button class="btn btn-p" onclick="svPe('+(novo?'null':p.id)+')" type="button">Salvar</button></div>'+
    '</div></div>');
  document.getElementById('mb4').addEventListener('click',function(e){if(e.target===this)fechar();});
}

function svPe(id){
  var pa=document.getElementById('pepa').value.trim();if(!pa){alert('Informe a parte/cliente.');return;}
  var obj={id:id===null?npeId++:id,processo:document.getElementById('pepr').value.trim(),parte:pa,
    vara:document.getElementById('peva').value.trim(),objeto:document.getElementById('peob').value.trim(),
    dataInicio:document.getElementById('pedi').value,valor:parseFloat(document.getElementById('peval').value)||0,
    status:document.getElementById('pest').value,obs:document.getElementById('peobs').value.trim()};
  if(id===null){pericias.push(obj);toast('Perícia cadastrada!');}
  else{var i=pericias.findIndex(function(p){return p.id===id;});if(i>=0)pericias[i]=obj;toast('Atualizado!');}
  save(SKPE,pericias,npeId);fechar();renderPe();
}
function dPe(id){if(!confirm('Excluir esta perícia?'))return;pericias=pericias.filter(function(p){return p.id!==id;});save(SKPE,pericias,npeId);fechar();renderPe();toast('Excluído.');}

function renderPe(){rMPe();rTPe();}
renderP();renderPe();
</script>
</body>
</html>
